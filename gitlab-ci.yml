stages:
  - lint
  - build
  - deploy
  - cleanup

# проверка стиля кода
linting:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install flake8
    - flake8 . --exclude=venv,migrations

# сборка образа
build_image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker build -t money_monitor_app:latest .

deploy_job:
  stage: deploy
  script:
    - docker compose down
    - docker compose up -d
  only:
    - main

# очистка старых образов
cleanup_job:
  stage: cleanup
  image: docker:24.0.5
  script:
    - chmod +x ./scripts/cleanup.sh
    - ./scripts/cleanup.sh
  when: always